<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moood Studio Agency | Modern Design-to-Code Pipeline</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="index-page">
    <div class="index-container">
        <header class="index-header">
            <img src="assets/images/moood-logo.svg" alt="Moood Studio Agency" class="main-logo">
            <p class="tagline">The Digital Fidelity Powerhouse</p>
        </header>

        <nav class="agency-portal">
            <div class="portal-card">
                <h3>Technical Assets</h3>
                <ul>
                    <li>
                        <a href="Figma-Technical-Handoff-Guide.html">
                            <span class="link-title">Figma Handoff Guide</span>
                            <span class="link-desc">Technical blueprint for design-to-code compliance.</span>
                        </a>
                    </li>
                </ul>
            </div>

            <div class="portal-card disabled">
                <h3>Portfolio & Benchmarks</h3>
                <p class="coming-soon">Library content coming soon.</p>
            </div>
        </nav>

        <footer class="index-footer">
            <p>&copy; 2026 Moood Studio Agency. All rights reserved.</p>
        </footer>
    </div>

    <style>
        .index-page {
            background-color: #fcfcfc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .index-container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .main-logo {
            height: 80px;
            margin-bottom: 16px;
        }

        .tagline {
            color: #86868b;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 64px;
        }

        .agency-portal {
            display: flex;
            flex-direction: column;
            gap: 24px;
            text-align: left;
        }

        .portal-card {
            background: white;
            border: 1px solid #e5e5ea;
            border-radius: 16px;
            padding: 32px;
            transition: transform 0.2s ease;
        }

        .portal-card h3 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #86868b;
            margin-bottom: 24px;
        }

        .portal-card ul {
            list-style: none;
            padding: 0;
        }

        .portal-card a {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .link-title {
            color: #007aff;
            font-size: 18px;
            font-weight: 600;
        }

        .link-desc {
            color: #424245;
            font-size: 14px;
        }

        .disabled {
            opacity: 0.6;
            background: #f5f5f7;
        }

        .coming-soon {
            font-size: 14px;
            color: #86868b;
            font-style: italic;
        }

        .index-footer {
            margin-top: 64px;
            font-size: 12px;
            color: #86868b;
        }
    </style>
</body>

</html>
